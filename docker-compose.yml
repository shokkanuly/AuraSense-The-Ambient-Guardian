version: '3.8'

services:
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: aurasense-db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=aurasense
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./hub/db/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    restart: unless-stopped

  mosquitto:
    image: eclipse-mosquitto:latest
    container_name: aurasense-mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./hub/config/mosquitto.conf:/mosquitto/config/mosquitto.conf
    restart: unless-stopped

volumes:
  timescale_data:
